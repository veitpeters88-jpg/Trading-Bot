name: Trading Bot Update

on:
  schedule:
    # 06:00 Uhr deutscher Zeit (04:00 UTC)
    - cron: '0 4 * * 1-5'
    # 10:00 Uhr deutscher Zeit (08:00 UTC)
    - cron: '0 8 * * 1-5'
    # 14:00 Uhr deutscher Zeit (12:00 UTC)
    - cron: '0 12 * * 1-5'
    # 15:30 Uhr deutscher Zeit (13:30 UTC) - US-Eröffnung
    - cron: '30 13 * * 1-5'
    # 18:00 Uhr deutscher Zeit (16:00 UTC)
    - cron: '0 16 * * 1-5'
    # 21:00 Uhr deutscher Zeit (19:00 UTC)
    - cron: '0 19 * * 1-5'
  
  workflow_dispatch: # Erlaubt das manuelle Starten über den GitHub-Button

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance anthropic

      - name: Run Trading Bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python bot.py
